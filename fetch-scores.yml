name: Fetch World Cup Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch scores from API-Football (free tier)
        env:
          API_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: |
          curl -s \
            -H "x-apisports-key: ${API_KEY}" \
            "https://v3.football.api-sports.io/standings?league=1&season=2026" \
            -o raw_standings.json

